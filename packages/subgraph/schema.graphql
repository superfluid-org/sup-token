type Program @entity(immutable: false) {
  id: String! # uint256
  programAdmin: Bytes! # address
  signer: Bytes! # address
  token: Bytes! # address
  distributionPool: Bytes! # address
  fundingAmount: BigInt! # uint256
  subsidyAmount: BigInt! # uint256
  earlyEndDate: BigInt! # uint256
  endDate: BigInt! # uint256
  stoppedDate: BigInt! # uint256
  fundingCompensationAmount: BigInt! # uint256
  subsidyCompensationAmount: BigInt! # uint256
  cancellationDate: BigInt! # uint256
  returnedDeposit: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Locker @entity(immutable: true) {
  """
  The address of the deployed locker contract.
  """
  id: Bytes!

  """
  The address of the locker owner.
  """
  lockerOwner: Bytes!

  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!

  """
  Derived field referencing staking data for this locker.
  """
  stakingData: LockerStaking @derivedFrom(field: "locker")
}

type FluidStreamClaimEvent @entity(immutable: true) {
  """
  A generated unique identifier for the claim event.
  """
  id: Bytes!

  """
  The locker contract that the claim event is associated with.
  """
  locker: Locker!

  """
  The address of the msg.sender.
  """
  claimer: Bytes!

  """
  A mapping of programId to the claim event units.
  """
  units: [ClaimEventUnit!]! @derivedFrom(field: "event")

  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ClaimEventUnit @entity(immutable: true) {
  """
  A generated unique identifier for the claim event unit.
  """
  id: Bytes!

  """
  The programId that the claim event unit is associated with.
  """
  programId: String!

  """
  The amount of units claimed.
  """
  amount: BigInt! # uint256

  event: FluidStreamClaimEvent!
}

type StakingStats @entity(immutable: false) {
  """
  Singleton entity to track global staking statistics.
  ID is always "global".
  """
  id: ID!

  """
  Current total amount staked across all lockers.
  """
  totalStaked: BigInt!

  """
  Number of lockers that currently have staked balance > 0.
  """
  activeStakerCount: BigInt!

  """
  Total number of lockers that have ever staked (even if currently 0).
  """
  totalStakerCount: BigInt!

  """
  Total number of staking events (stakes + unstakes) across all lockers.
  """
  stakingEventCount: BigInt!

  """
  Timestamp when this entity was last updated.
  """
  lastUpdatedTimestamp: BigInt!

  """
  Block number when this entity was last updated.
  """
  lastUpdatedBlock: BigInt!

  # Dynamic Configuration (updated via events)
  """
  Tax distribution pool address.
  """
  taxDistributionPool: Bytes

  """
  Staker allocation in basis points (BP = Basis Points, where 10000 BP = 100%).
  """
  stakerAllocationBP: BigInt

  """
  Current staker flow rate from tax distribution.
  """
  currentStakerFlowRate: BigInt
}

type LockerStaking @entity(immutable: false) {
  """
  The address of the locker contract.
  """
  id: Bytes!

  """
  Reference to the Locker entity.
  """
  locker: Locker!

  """
  Current amount staked in this locker.
  """
  currentStakedBalance: BigInt!

  """
  Number of staking events for this locker.
  """
  stakingEventCount: BigInt!

  """
  Timestamp when this locker first staked (null if never staked).
  """
  firstStakedTimestamp: BigInt

  """
  Most recent stake timestamp.
  """
  lastStakedTimestamp: BigInt

  """
  Most recent unstake timestamp.
  """
  lastUnstakedTimestamp: BigInt

  """
  Timestamp when this entity was last updated.
  """
  lastUpdatedTimestamp: BigInt!

  """
  Block number when this entity was last updated.
  """
  lastUpdatedBlock: BigInt!

  """
  Current reward units from StakingRewardController.
  """
  rewardUnits: BigInt!
}

enum StakingEventType {
  STAKE
  UNSTAKE
}

type StakingEvent @entity(immutable: true) {
  """
  Unique identifier: transaction hash concatenated with log index.
  """
  id: Bytes!

  """
  Reference to the LockerStaking entity this event affects.
  """
  lockerStaking: LockerStaking!

  """
  Type of staking event (STAKE or UNSTAKE).
  """
  type: StakingEventType!

  """
  Amount that was staked or unstaked.
  """
  amount: BigInt!

  """
  The total staked balance for this locker after this event.
  """
  newStakedBalance: BigInt!

  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Fontaine @entity(immutable: true) {
  """
  The address of the deployed Fontaine contract.
  """
  id: Bytes!

  """
  The locker contract that created this Fontaine.
  """
  locker: Locker!

  """
  The recipient address that will receive the unlocked tokens.
  """
  recipient: Bytes!

  """
  The unlock period in seconds.
  """
  unlockPeriod: BigInt!

  """
  The total amount being unlocked.
  """
  unlockAmount: BigInt!

  """
  The flow rate for the unlock stream.
  """
  unlockFlowRate: BigInt!

  """
  The date at which the unlock is completed.
  """
  endDate: BigInt!

  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
