specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FluidEPProgramManager
    network: {{network}}
    source:
      abi: FluidEPProgramManager
      address: "{{FluidEPProgramManager.address}}"
      startBlock: {{FluidEPProgramManager.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Program
      abis:
        - name: FluidEPProgramManager
          file: ./abis/FluidEPProgramManager.json
      eventHandlers:
        - event: ProgramCancelled(indexed uint256,indexed uint256)
          handler: handleProgramCancelled
        - event: ProgramCreated(uint256,address,address,address,address)
          handler: handleProgramCreated
        - event: ProgramFunded(indexed uint256,indexed uint256,indexed
            uint256,uint256,uint256)
          handler: handleProgramFunded
        - event: ProgramSignerUpdated(uint256,address)
          handler: handleProgramSignerUpdated
        - event: ProgramStopped(indexed uint256,indexed uint256,indexed uint256)
          handler: handleProgramStopped
      file: ./src/fluid-ep-program-manager.ts
  - kind: ethereum
    name: FluidLockerFactory
    network: {{network}}
    source:
      abi: FluidLockerFactory
      address: "{{FluidLockerFactory.address}}"
      startBlock: {{FluidLockerFactory.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Locker
      abis:
        - name: FluidLockerFactory
          file: ./abis/FluidLockerFactory.json
      eventHandlers:
        - event: LockerCreated(address,address)
          handler: handleLockerCreated
      file: ./src/fluid-locker-factory.ts
  - kind: ethereum
    name: StakingRewardController
    network: {{network}}
    source:
      abi: StakingRewardController
      address: "{{StakingRewardController.address}}"
      startBlock: {{StakingRewardController.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LockerStaking
        - StakingStats
      abis:
        - name: StakingRewardController
          file: ./abis/StakingRewardController.json
      eventHandlers:
        - event: UpdatedStakersUnits(indexed address,indexed uint128)
          handler: handleUpdatedStakersUnits
        - event: TaxAllocationUpdated(uint128,uint128)
          handler: handleTaxAllocationUpdated
        - event: TaxDistributionFlowUpdated(int96,int96)
          handler: handleTaxDistributionFlowUpdated
      file: ./src/staking-reward-controller.ts
templates:
  - kind: ethereum
    name: FluidLocker
    network: {{network}}
    source:
      abi: FluidLocker
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Locker
        - FluidStreamClaimEvent
        - ClaimEventUnit
        - Program
        - StakingStats
        - LockerStaking
        - StakingEvent
      abis:
        - name: FluidLocker
          file: ./abis/FluidLocker.json
      eventHandlers:
        - event: FluidStreamClaimed(indexed uint256,indexed uint256)
          handler: handleFluidStreamClaimed
        - event: FluidStreamsClaimed(indexed uint256[],indexed uint256[])
          handler: handleFluidStreamClaimedBulk
        - event: FluidStaked(indexed uint256,indexed uint256)
          handler: handleFluidStaked
        - event: FluidUnstaked()
          handler: handleFluidUnstaked
      file: ./src/fluid-locker.ts
